name: Docker Publish

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string
        description: The dist plan JSON

jobs:
  docker-publish:
    runs-on: ubuntu-22.04
    if: ${{ fromJson(inputs.plan).announcement_tag != '' && !fromJson(inputs.plan).announcement_is_prerelease }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary_name: qb-autoremove
            image_name: hiddenpdx/qb-autoremove
          - binary_name: qb-move-after-days
            image_name: hiddenpdx/qb-move-after-days
          - binary_name: qb-move-on-low-space
            image_name: hiddenpdx/qb-move-on-low-space
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ fromJson(inputs.plan).announcement_tag }}
            type=raw,value=latest,enable=${{ !fromJson(inputs.plan).announcement_is_prerelease }}

      - uses: actions/download-artifact@v7
        with:
          name: docker-binaries-amd64
          path: artifacts/amd64

      - uses: actions/download-artifact@v7
        with:
          name: docker-binaries-arm64
          path: artifacts/arm64

      - name: Prepare Docker binaries
        shell: bash
        run: |
          set -euo pipefail
          for binary_path in \
            "artifacts/amd64/${{ matrix.binary_name }}" \
            "artifacts/arm64/${{ matrix.binary_name }}"
          do
            if [ ! -f "$binary_path" ]; then
              printf '%s\n' "missing ${binary_path} for Docker publish" >&2
              exit 1
            fi

            chmod 755 "$binary_path"
          done

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BINARY_NAME=${{ matrix.binary_name }}
